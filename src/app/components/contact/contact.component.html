<section class="section" id="contact">
  <div class="container">
    <div class="section-title">
      <h2>Contact</h2>
      <p>A clean, simple layout so it’s easy to reach out.</p>
    </div>

    <div class="card">
      <div class="card-inner contact">
        <div class="contact-copy">
          <p class="headline">Let’s talk</p>
          <p class="muted">
            If you’re hiring for Full Stack or Data-oriented roles, I’m happy to share details and walk through the featured
            project.
          </p>
        </div>

        <div class="contact-actions" aria-label="Contact details">
          <div class="row">
            <span class="label">Email</span>
            <a class="value" [href]="'mailto:' + email">{{ email }}</a>
          </div>
          <div class="row">
            <span class="label">Location</span>
            <span class="value muted">Madrid, Spain</span>
          </div>
          <div class="row">
            <span class="label">Availability</span>
            <span class="value muted">Open to interviews</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
